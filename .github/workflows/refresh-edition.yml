# Vercel Hobby solo permite crons diarios, asi que la frecuencia real
# de actualizacion sale de este workflow: pega al endpoint de ingesta
# cada 30 minutos y deja los crons de Vercel como respaldo diario.
name: Refresh edition

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-edition
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        task: [articles, clickbait]
    steps:
      - name: Validate configuration
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is missing in GitHub Actions."
            exit 1
          fi

      - name: Refresh ${{ matrix.task }}
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TASK: ${{ matrix.task }}
        run: |
          status=$(curl --silent --show-error \
            --connect-timeout 15 \
            --max-time 230 \
            --retry 2 \
            --retry-delay 5 \
            --retry-max-time 250 \
            --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            -o response.json \
            -w "%{http_code}" \
            "https://v0-ai-news-verification-ten.vercel.app/api/cron/ingest?task=$TASK")
          echo "HTTP $status"
          head -c 1200 response.json
          echo
          [ "$status" = "200" ]
